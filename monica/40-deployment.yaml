apiVersion: apps/v1
kind: Deployment
metadata:
  name: monica
  namespace: monica
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels: {app: monica}
  template:
    metadata:
      labels: {app: monica}
    spec:
      containers:
        # Simpler "apache" image exposes HTTP on :80 (no separate web server).
        - name: app
          image: monica:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              value: "mariadb-svc"
            - name: DB_PORT
              value: "3306"
            - name: APP_ENV
              value: "production"
            - name: APP_URL
              value: "https://monica.internal.czcx.cc"
            - name: QUEUE_CONNECTION
              value: "database"
            - name: SESSION_DRIVER
              value: "file"
          envFrom:
            - secretRef: 
                name: monica-app
            - secretRef: 
                name: monica-db
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 300m
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12  # 2 minutes to start
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: monica-storage
