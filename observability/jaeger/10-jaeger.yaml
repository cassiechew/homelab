apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata:
  name: jaeger
  namespace: observability
spec:
  strategy: production
  collector:
    replicas: 1
    options:
      log-level: debug
      collector.otlp.grpc.host-port: ":14250"
      collector.otlp.http.host-port: ":4318"
  ingester:
    options:
      log-level: debug
  storage:
    type: badger
    options:
      badger:
        directory-key: /badger/key
        directory-value: /badger/value
        ephemeral: false
  volumeMounts:
    - name: badger-storage
      mountPath: /badger
  volumes:
    - name: badger-storage
      emptyDir: {}
  ingress:
    enabled: false
