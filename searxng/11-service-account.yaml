apiVersion: v1
kind: ServiceAccount
metadata:
  name: searxng
  namespace: searxng
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: searxng-tailscale
  namespace: searxng
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tailscale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: searxng-tailscale
  namespace: searxng
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: searxng-tailscale
subjects:
  - kind: ServiceAccount
    name: searxng
    namespace: searxng
