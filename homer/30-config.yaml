apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    ---
    title: "Homelab Dashboard"
    header: true
    footer: false
    columns: "2"
    connectivityCheck: true
    theme: default
    colors:
      light:
        highlight-primary:   "#CC0052"
        highlight-secondary: "#F77AB0"
        highlight-hover:     "#FF0066"
        background:          "#FFF0F5"
        card-background:     "#FFFFFF"
        text:                "#1E1E2E"
        text-header:         "#FFFFFF"
        text-title:          "#CC0052"
        text-subtitle:       "#C4608A"
        card-shadow:         "rgba(204, 0, 82, 0.08) 0px 4px 24px"
        link:                "#7C4DFF"
        link-hover:          "#CC0052"
      dark:
        highlight-primary:   "#FF0066"
        highlight-secondary: "#F77AB0"
        highlight-hover:     "#CC0052"
        background:          "#161616"
        card-background:     "#1e1e1e"
        text:                "#F2F4F8"
        text-header:         "#F2F4F8"
        text-title:          "#FF0066"
        text-subtitle:       "#F77AB0"
        card-shadow:         "rgba(255, 0, 102, 0.08) 0px 4px 24px"
        link:                "#C4A7E7"
        link-hover:          "#FF0066"
    stylesheet:
      - "assets/custom.css"
    links:
      - name: "Kubernetes Config"
        icon: "fab fa-github"
        url: "https://github.com/hugomd/kubernetes-homelab"
    services:
      - name: "Media"
        icon: "fas fa-play-circle"
        # A path to an image can also be provided. Note that icon take precedence if both icon and logo are set.
        # logo: "path/to/logo"
        items:
          - name: "NAS"
            # logo: "assets/tools/sample.png"
            # Alternatively a fa icon can be provided:
            icon: "fas fa-play-circle"
            tag: "media"
            url: "https://nas.internal.czcx.cc"
          - name: "Jellyfin"
            # logo: "assets/tools/sample.png"
            # Alternatively a fa icon can be provided:
            icon: "fas fa-play-circle"
            tag: "media"
            url: "https://jellyfin.internal.czcx.cc/web/"
      - name: "Identity"
        icon: "fas fa-key"
        items:
          - name: "Pocket ID"
            icon: "fas fa-fingerprint"
            tag: "auth"
            url: "https://pocket.internal.czcx.cc"

      - name: "Productivity"
        icon: "fas fa-pen-fancy"
        items:
          - name: "Affine"
            icon: "fas fa-book-open"
            tag: "notes"
            url: "https://affine.internal.czcx.cc"
          - name: "Monica"
            icon: "fas fa-address-book"
            tag: "crm"
            url: "https://monica.internal.czcx.cc"
      - name: "Networking"
        icon: "fas fa-server"
        items:
          - name: "NextDNS"
            url: "https://my.nextdns.io"
            icon: "fas fa-book"
          - name: "whoami"
            url: "https://who.czcx.cc"
            tag: "ID"
            icon: "fas fa-user"
      - name: "Monitoring"
        icon: "fas fa-heartbeat"
        items:
          - name: "Grafana"
            url: "https://grafana.internal.czcx.cc"
            icon: "fa fa-exclamation-circle"
            tag: "metrics"
          - name: "Prometheus"
            url: "https://prometheus.internal.czcx.cc"
            icon: "fa fa-fire"
            tag: "source"
          - name: "Kiali"
            url: "https://kiali.internal.czcx.cc"
            icon: "fa fa-sailboat"
            tag: "istio"
          - name: "Jaeger"
            url: "https://jaeger.internal.czcx.cc"
            icon: "fa fa-bullseye"
            tag: "metrics"
  custom.css: |
    :root {
      /* Core */
      --highlight-primary:   #FF0066;
      --highlight-secondary: #F77AB0;
      --highlight-hover:     #CC0052;
      --background:          #161616;
      --card-background:     #1e1e1e;
    
      /* Text */
      --text:          #F2F4F8;
      --text-header:   #F2F4F8;
      --text-title:    #FF0066;
      --text-subtitle: #F77AB0;
    
      /* Links & icons */
      --link:       #C4A7E7;
      --link-hover: #FF0066;
    
      /* Cards */
      --card-shadow: rgba(255, 0, 102, 0.08) 0px 4px 24px;
    }
    
    /* ---- Navbar ---- */
    #app > nav {
      border-bottom: 1px solid #FF0066;
    }
    
    /* ---- Search ---- */
    #search-input:focus {
      border-color: #FF0066;
      box-shadow: 0 0 0 2px rgba(255, 0, 102, 0.2);
    }
    
    /* ---- Cards ---- */
    .card {
      border: 1px solid #2a2a2a;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    
    .card:hover {
      border-color: #FF0066;
      box-shadow: rgba(255, 0, 102, 0.15) 0px 4px 24px;
    }
    
    /* ---- Tags ---- */
    .tag {
      background-color: #C4A7E7;
      color: #161616;
    }
    
    /* ---- Group titles ---- */
    h2.group-title {
      color: #C4A7E7;
      border-bottom: 1px solid #333344;
    }
     
