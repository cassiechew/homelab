apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali
  namespace: istio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: kiali
    creationPolicy: Owner
  data:
    - secretKey: oidc-secret
      remoteRef:
        key: kiali/oidc-secret
